      <stop offset="0.45" stop-color="#14AEC2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#14AEC2" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="34" flood-color="#00151A" flood-opacity="0.46"/>
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#14AEC2" flood-opacity="0.18"/>
    </filter>
