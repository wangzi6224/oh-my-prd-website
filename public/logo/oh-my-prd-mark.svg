      <stop offset="0.56" stop-color="#14AEC2" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#0A4550" stop-opacity="0.84"/>
    </linearGradient>
    <radialGradient id="aura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(218 218)">
