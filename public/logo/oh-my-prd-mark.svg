<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Oh My PRD App Mark</title>
  <desc id="desc">A square glassmorphism app mark for Oh My PRD, using teal AI nodes and a structured PRD symbol.</desc>
  <defs>
    <linearGradient id="brandGradient" x1="151" y1="116" x2="384" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
