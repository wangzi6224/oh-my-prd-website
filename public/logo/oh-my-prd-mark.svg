      <stop offset="0.48" stop-color="#14AEC2"/>
      <stop offset="0.78" stop-color="#0E6A78"/>
      <stop offset="1" stop-color="#062D36"/>
    </linearGradient>
    <linearGradient id="glassPanel" x1="76" y1="65" x2="432" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.38"/>
