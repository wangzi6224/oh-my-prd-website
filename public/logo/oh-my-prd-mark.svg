      <circle cx="386" cy="161" r="9" fill="#C5FBFF"/>
      <circle cx="386" cy="161" r="16" stroke="#14AEC2" stroke-opacity="0.28"/>
      <circle cx="385" cy="377" r="8" fill="#7BEFFA"/>
